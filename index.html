<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>진심이 주제 생성기</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', -apple-system, sans-serif;
    background: #0d0d14;
    color: #e8e8f0;
    min-height: 100vh;
    padding: 32px 24px;
    max-width: 760px;
    margin: 0 auto;
  }

  .header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 28px; }
  .header-left h1 { font-size: 22px; font-weight: 800; color: #fff; letter-spacing: -0.03em; margin-bottom: 4px; }
  .header-left p { font-size: 12px; color: #555; }
  .header-badge { background: #1a1a28; border: 1px solid #2e2e48; border-radius: 8px; padding: 6px 14px; font-size: 12px; color: #8888bb; white-space: nowrap; }

  /* API */
  .api-section { background: #13131e; border: 1px solid #2a2a40; border-radius: 12px; padding: 16px 18px; margin-bottom: 16px; }
  .section-label { font-size: 11px; color: #666; text-transform: uppercase; letter-spacing: .06em; display: block; margin-bottom: 10px; }
  .api-row { display: flex; gap: 8px; }
  .api-input { flex: 1; background: #0d0d14; border: 1px solid #2a2a40; border-radius: 8px; padding: 9px 13px; font-size: 13px; color: #e0e0f0; outline: none; font-family: monospace; transition: border-color .2s; }
  .api-input:focus { border-color: #6366f1; }
  .api-input::placeholder { color: #333; }
  .btn-api-save { background: #1e1e32; border: 1px solid #3a3a58; border-radius: 8px; padding: 9px 16px; font-size: 12px; font-weight: 600; color: #9999cc; cursor: pointer; white-space: nowrap; transition: all .15s; }
  .btn-api-save:hover { background: #252540; border-color: #6366f1; color: #aaaaff; }
  .api-status { font-size: 11px; margin-top: 6px; min-height: 16px; }
  .api-status.ok { color: #55cc88; }
  .api-status.err { color: #ff6666; }

  /* 입력 구조화 */
  .input-section { background: #13131e; border: 1px solid #2a2a40; border-radius: 12px; padding: 18px; margin-bottom: 16px; }
  .input-group { margin-bottom: 16px; }
  .input-group:last-child { margin-bottom: 0; }
  .input-group-label { font-size: 11px; color: #666; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 8px; display: block; }

  .chip-group { display: flex; flex-wrap: wrap; gap: 7px; }
  .chip {
    background: #1a1a28; border: 1px solid #2e2e48; border-radius: 99px;
    padding: 6px 14px; font-size: 12px; color: #8888bb; cursor: pointer;
    transition: all .15s; user-select: none; font-family: inherit;
  }
  .chip:hover { border-color: #6366f1; color: #aaaaee; background: #1e1e38; }
  .chip.selected { background: #1e1e48; border-color: #6366f1; color: #aaaaff; font-weight: 600; }
  .chip.single-select.selected { background: #1e1e48; border-color: #6366f1; color: #aaaaff; }

  .kw-extra { width: 100%; background: #0d0d14; border: 1px solid #2a2a40; border-radius: 8px; padding: 9px 13px; font-size: 13px; color: #e0e0f0; outline: none; font-family: inherit; transition: border-color .2s; margin-top: 8px; resize: none; }
  .kw-extra:focus { border-color: #6366f1; }
  .kw-extra::placeholder { color: #333; }

  .gen-row { display: flex; gap: 8px; margin-top: 16px; }
  .btn { border: none; border-radius: 8px; padding: 11px 20px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit; transition: all .15s; white-space: nowrap; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-primary { background: #6366f1; color: #fff; flex: 1; }
  .btn-primary:not(:disabled):hover { background: #5254d4; }
  .btn-random { background: #1e1e32; border: 1px solid #3a3a58; color: #c0c0e8; }
  .btn-random:not(:disabled):hover { background: #25253e; border-color: #6366f1; }

  /* 결과 */
  .result-section { margin-bottom: 20px; }
  .placeholder-card { background: #13131e; border: 1px dashed #2a2a40; border-radius: 12px; padding: 40px 24px; text-align: center; color: #444; }
  .placeholder-card .icon { font-size: 36px; margin-bottom: 12px; }
  .placeholder-card p { font-size: 13px; line-height: 1.6; }

  .loading-card { background: #13131e; border: 1px solid #2a2a40; border-radius: 12px; padding: 48px 24px; text-align: center; }
  .spinner { width: 28px; height: 28px; border: 2px solid #2a2a40; border-top-color: #6366f1; border-radius: 50%; animation: spin .7s linear infinite; margin: 0 auto 14px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-card p { font-size: 13px; color: #555; }
  .loading-card .sub { font-size: 11px; color: #444; margin-top: 5px; }

  .result-card { background: #13131e; border: 1px solid #2a2a40; border-radius: 12px; padding: 22px; animation: fadeUp .3s ease; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  .result-tags { display: flex; gap: 7px; flex-wrap: wrap; margin-bottom: 14px; }
  .tag { font-size: 11px; padding: 3px 10px; border-radius: 99px; font-weight: 500; }
  .tag-edu { background: #1a1a38; color: #8888ff; border: 1px solid #2e2e5a; }
  .tag-list { background: #0f2018; color: #55bb77; border: 1px solid #1e4030; }
  .tag-compare { background: #280f10; color: #ff7777; border: 1px solid #4a1e1e; }
  .tag-news { background: #251e08; color: #ddaa44; border: 1px solid #443310; }
  .tag-case { background: #0a1e28; color: #44aadd; border: 1px solid #103344; }
  .tag-gray { background: #1a1a1a; color: #666; border: 1px solid #2a2a2a; }

  .result-topic { font-size: 20px; font-weight: 800; color: #fff; line-height: 1.35; letter-spacing: -0.025em; margin-bottom: 18px; }
  .field { margin-bottom: 12px; }
  .field-label { font-size: 10px; color: #555; text-transform: uppercase; letter-spacing: .07em; margin-bottom: 5px; }
  .field-value { font-size: 13px; color: #b0b0cc; line-height: 1.6; background: #0d0d14; border-radius: 7px; padding: 10px 14px; }
  .field-hook { font-size: 14px; color: #d0d0f0; border-left: 3px solid #6366f1; background: #0d0d14; border-radius: 0 7px 7px 0; padding: 10px 14px; line-height: 1.6; font-style: italic; }
  .field-cta { font-size: 13px; color: #55dd88; background: #081810; border: 1px solid #0f3020; border-radius: 7px; padding: 10px 14px; line-height: 1.6; }
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }

  .card-actions { display: flex; gap: 8px; margin-top: 18px; padding-top: 16px; border-top: 1px solid #1e1e2e; flex-wrap: wrap; }
  .btn-save { background: #0f2820; border: 1px solid #1e4835; color: #44cc77; border-radius: 8px; padding: 9px 16px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit; transition: all .15s; }
  .btn-save:hover { background: #142e25; }
  .btn-save.saved { color: #33aa55; cursor: default; opacity: 0.7; }
  .btn-copy { background: #1a1a2e; border: 1px solid #2e2e48; color: #8888bb; border-radius: 8px; padding: 9px 16px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit; transition: all .15s; }
  .btn-copy:hover { background: #20203a; }
  .btn-script { background: #1e1428; border: 1px solid #3a2858; color: #bb88ff; border-radius: 8px; padding: 9px 16px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit; transition: all .15s; }
  .btn-script:hover { background: #251a35; }
  .btn-script:disabled { opacity: 0.4; cursor: not-allowed; }

  .error-card { background: #1e0a0a; border: 1px solid #4a1515; border-radius: 12px; padding: 16px 18px; color: #ff7777; font-size: 13px; line-height: 1.6; }

  /* 원고 */
  .script-section { margin-top: 12px; }
  .script-card { background: #0f0f1a; border: 1px solid #2a2a50; border-radius: 12px; overflow: hidden; animation: fadeUp .3s ease; }
  .script-header { background: #1a1428; border-bottom: 1px solid #2a2050; padding: 14px 18px; display: flex; align-items: center; justify-content: space-between; }
  .script-header-title { font-size: 13px; font-weight: 700; color: #cc99ff; }
  .btn-script-copy { background: #251a38; border: 1px solid #3a2858; color: #aa77ee; border-radius: 6px; padding: 5px 12px; font-size: 11px; font-weight: 600; cursor: pointer; font-family: inherit; transition: all .15s; }
  .btn-script-copy:hover { background: #30205a; }
  .script-body { padding: 18px; }
  .slide-block { margin-bottom: 14px; border: 1px solid #1e1e38; border-radius: 10px; overflow: hidden; }
  .slide-block:last-child { margin-bottom: 0; }
  .slide-num-bar { background: #1a1428; padding: 8px 14px; display: flex; align-items: center; gap: 8px; }
  .slide-num { font-size: 10px; font-weight: 700; color: #8866cc; text-transform: uppercase; letter-spacing: .08em; }
  .slide-role { font-size: 10px; color: #555; }
  .slide-content { padding: 12px 14px; }
  .slide-title-text { font-size: 14px; font-weight: 700; color: #e0d8ff; margin-bottom: 6px; line-height: 1.4; }
  .slide-body-text { font-size: 13px; color: #9090b8; line-height: 1.7; white-space: pre-wrap; margin-bottom: 8px; }
  .slide-layout-label { font-size: 10px; color: #553377; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 3px; }
  .slide-layout-memo { font-size: 11px; color: #664488; background: #0f0a18; border: 1px solid #2a1850; border-radius: 5px; padding: 6px 10px; line-height: 1.5; }

  /* 구분선 */
  .divider { height: 1px; background: #1a1a28; margin: 24px 0; }

  /* 저장 목록 */
  .saved-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .saved-title { font-size: 14px; font-weight: 700; color: #666; }
  .saved-actions { display: flex; gap: 8px; align-items: center; }
  .saved-count-badge { background: #1a1a28; border: 1px solid #2e2e48; border-radius: 99px; padding: 2px 10px; font-size: 11px; color: #8888bb; }
  .btn-export { background: #1a1a28; border: 1px solid #2e2e48; border-radius: 7px; padding: 5px 12px; font-size: 11px; font-weight: 600; color: #7777aa; cursor: pointer; font-family: inherit; transition: all .15s; }
  .btn-export:hover { background: #20203a; color: #9999cc; }

  .saved-empty { text-align: center; padding: 28px; color: #333; font-size: 12px; background: #13131e; border: 1px dashed #2a2a40; border-radius: 10px; line-height: 1.7; }
  .saved-item { background: #13131e; border: 1px solid #2a2a40; border-radius: 10px; padding: 14px 16px; margin-bottom: 4px; display: flex; align-items: flex-start; gap: 12px; transition: border-color .15s; animation: fadeUp .2s ease; }
  .saved-item:hover { border-color: #3a3a58; }
  .saved-item.published { opacity: 0.55; border-style: dashed; }
  .saved-num { font-size: 10px; color: #444; padding-top: 3px; flex-shrink: 0; width: 20px; }
  .saved-content { flex: 1; min-width: 0; }
  .saved-topic { font-size: 14px; font-weight: 700; color: #d0d0e8; line-height: 1.4; margin-bottom: 5px; }
  .saved-hook { font-size: 12px; color: #555; line-height: 1.5; margin-bottom: 7px; font-style: italic; }
  .saved-meta { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
  .saved-meta-tag { font-size: 10px; padding: 1px 8px; border-radius: 99px; background: #1a1a28; border: 1px solid #2a2a40; color: #666; }
  .published-badge { font-size: 10px; padding: 1px 8px; border-radius: 99px; background: #0a1a0a; border: 1px solid #1a3a1a; color: #447744; }
  .saved-item-actions { display: flex; flex-direction: column; gap: 6px; flex-shrink: 0; align-items: flex-end; }
  .btn-del { background: none; border: none; color: #333; cursor: pointer; font-size: 18px; line-height: 1; padding: 2px 4px; transition: color .15s; border-radius: 4px; }
  .btn-del:hover { color: #cc3333; background: #1e0a0a; }
  .btn-gen-script { background: #1e1428; border: 1px solid #3a2858; color: #9966dd; border-radius: 6px; padding: 4px 10px; font-size: 11px; font-weight: 600; cursor: pointer; font-family: inherit; transition: all .15s; white-space: nowrap; }
  .btn-gen-script:hover { background: #251a35; color: #bb88ff; }
  .btn-mark-published { background: #0a1a10; border: 1px solid #1a3a20; color: #447744; border-radius: 6px; padding: 4px 10px; font-size: 11px; font-weight: 600; cursor: pointer; font-family: inherit; transition: all .15s; white-space: nowrap; }
  .btn-mark-published:hover { background: #0f2018; color: #55cc77; }
  .btn-mark-unpublished { background: #1a1a20; border: 1px solid #2a2a35; color: #555; border-radius: 6px; padding: 4px 10px; font-size: 11px; font-weight: 600; cursor: pointer; font-family: inherit; transition: all .15s; white-space: nowrap; }
  .btn-mark-unpublished:hover { background: #222228; color: #777; }

  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(60px); background: #1e2e1e; border: 1px solid #2e4e2e; color: #55cc77; padding: 10px 20px; border-radius: 99px; font-size: 13px; font-weight: 600; transition: transform .25s ease, opacity .25s ease; opacity: 0; pointer-events: none; z-index: 100; }
  .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

  .published-section-label { font-size: 11px; color: #444; text-transform: uppercase; letter-spacing: .06em; margin: 16px 0 8px; }

  /* 비밀번호 잠금 화면 */
  .lock-screen {
    position: fixed; inset: 0; background: #0d0d14;
    display: flex; align-items: center; justify-content: center;
    z-index: 9999;
  }
  .lock-box {
    background: #13131e; border: 1px solid #2a2a40; border-radius: 16px;
    padding: 40px 36px; width: 100%; max-width: 360px; text-align: center;
  }
  .lock-icon { font-size: 40px; margin-bottom: 16px; }
  .lock-title { font-size: 18px; font-weight: 800; color: #fff; margin-bottom: 6px; letter-spacing: -0.02em; }
  .lock-sub { font-size: 12px; color: #555; margin-bottom: 24px; }
  .lock-input {
    width: 100%; background: #0d0d14; border: 1px solid #2a2a40; border-radius: 8px;
    padding: 12px 14px; font-size: 14px; color: #e0e0f0; outline: none;
    font-family: inherit; text-align: center; letter-spacing: .1em;
    transition: border-color .2s; margin-bottom: 10px;
  }
  .lock-input:focus { border-color: #6366f1; }
  .lock-input::placeholder { color: #333; letter-spacing: 0; }
  .lock-btn {
    width: 100%; background: #6366f1; border: none; border-radius: 8px;
    padding: 12px; font-size: 14px; font-weight: 700; color: #fff;
    cursor: pointer; font-family: inherit; transition: all .15s;
  }
  .lock-btn:hover { background: #5254d4; }
  .lock-error { font-size: 12px; color: #ff6666; margin-top: 8px; min-height: 18px; }
  .app-content { display: none; }
</style>
</head>
<body>

<!-- 비밀번호 잠금 화면 -->
<div class="lock-screen" id="lock-screen">
  <div class="lock-box">
    <div class="lock-icon">🔒</div>
    <div class="lock-title">진심이 주제 생성기</div>
    <div class="lock-sub">@jinsim_ii · 팀 전용 도구</div>
    <input class="lock-input" type="password" id="lock-pw" placeholder="비밀번호를 입력하세요" />
    <button class="lock-btn" onclick="checkPassword()">입장하기</button>
    <div class="lock-error" id="lock-error"></div>
  </div>
</div>

<!-- 앱 본체 -->
<div class="app-content" id="app-content">

<div class="header">
  <div class="header-left">
    <h1>🧠 진심이 주제 생성기</h1>
    <p>@jinsim_ii · 병원 원장님 타겟 · B2B 캐러셀 기획 + 원고</p>
  </div>
  <div class="header-badge" id="saved-badge">저장 0개</div>
</div>

<!-- API 키 -->
<div class="api-section">
  <span class="section-label">Anthropic API Key</span>
  <div class="api-row">
    <input class="api-input" type="password" id="api-key" placeholder="sk-ant-..." />
    <button class="btn-api-save" onclick="saveApiKey()">저장</button>
  </div>
  <div class="api-status" id="api-status"></div>
</div>

<!-- 구조화 입력 -->
<div class="input-section">
  <div class="input-group">
    <span class="input-group-label">원장님 상황 (하나 선택)</span>
    <div class="chip-group" id="chips-situation">
      <button class="chip single-select" data-group="situation" data-val="개원 초기라 인지도가 없음" onclick="toggleSingle(this)">🏥 개원 초기</button>
      <button class="chip single-select" data-group="situation" data-val="운영 중인데 신환이 줄고 있음" onclick="toggleSingle(this)">📉 신환 감소</button>
      <button class="chip single-select" data-group="situation" data-val="광고비 대비 효과가 없음" onclick="toggleSingle(this)">💸 광고 효율 고민</button>
      <button class="chip single-select" data-group="situation" data-val="AI·디지털 트렌드를 따라가고 싶음" onclick="toggleSingle(this)">🤖 트렌드 적응</button>
      <button class="chip single-select" data-group="situation" data-val="마케팅 대행사 계약을 고려 중" onclick="toggleSingle(this)">🤝 대행사 검토 중</button>
    </div>
  </div>

  <div class="input-group">
    <span class="input-group-label">주요 고민 (복수 선택 가능)</span>
    <div class="chip-group" id="chips-concern">
      <button class="chip" data-val="AI 검색 노출" onclick="toggleMulti(this)">🔍 AI 검색 노출</button>
      <button class="chip" data-val="광고비 절감" onclick="toggleMulti(this)">💰 광고비 절감</button>
      <button class="chip" data-val="네이버 블로그·플레이스" onclick="toggleMulti(this)">🗺 네이버 노출</button>
      <button class="chip" data-val="의료광고 규제 대응" onclick="toggleMulti(this)">⚖️ 규제 대응</button>
      <button class="chip" data-val="SNS 콘텐츠 운영" onclick="toggleMulti(this)">📱 SNS 운영</button>
      <button class="chip" data-val="환자 후기·리뷰 관리" onclick="toggleMulti(this)">⭐ 리뷰 관리</button>
      <button class="chip" data-val="경쟁 병원 대비 차별화" onclick="toggleMulti(this)">🏆 차별화</button>
      <button class="chip" data-val="홈페이지 전환율" onclick="toggleMulti(this)">🌐 홈페이지</button>
    </div>
  </div>

  <div class="input-group">
    <span class="input-group-label">포맷 힌트</span>
    <div class="chip-group" id="chips-format">
      <button class="chip single-select selected" data-group="format" data-val="자동 추천" onclick="toggleSingle(this)">✨ 자동 추천</button>
      <button class="chip single-select" data-group="format" data-val="교육형" onclick="toggleSingle(this)">📚 교육형</button>
      <button class="chip single-select" data-group="format" data-val="리스트형" onclick="toggleSingle(this)">📋 리스트형</button>
      <button class="chip single-select" data-group="format" data-val="비교형" onclick="toggleSingle(this)">⚡ 비교형</button>
      <button class="chip single-select" data-group="format" data-val="트렌드형" onclick="toggleSingle(this)">📰 트렌드형</button>
      <button class="chip single-select" data-group="format" data-val="사례형" onclick="toggleSingle(this)">📊 사례형</button>
      <button class="chip single-select" data-group="format" data-val="저장형 (체크리스트·레퍼런스 중심으로 구성, 마지막 슬라이드에 저장 유도 CTA)" onclick="toggleSingle(this)">🔖 저장형</button>
      <button class="chip single-select" data-group="format" data-val="댓글자료형 (내용을 살짝 열어두고 마지막에 댓글로 키워드 남기면 자료 DM 전송하는 CTA, 검증된 @jinsim_ii 패턴)" onclick="toggleSingle(this)">💬 댓글자료형</button>
    </div>
  </div>

  <div class="input-group">
    <span class="input-group-label">추가 메모 (선택사항)</span>
    <textarea class="kw-extra" id="kw-extra" rows="2" placeholder="예: 요즘 ChatGPT 병원 검색 관련으로 가고 싶어, 스키마 마크업 후속편 느낌으로..."></textarea>
  </div>

  <div class="gen-row">
    <button class="btn btn-primary" id="btn-gen" onclick="generate('structured')">✨ 주제 생성</button>
    <button class="btn btn-random" id="btn-rand" onclick="generate('random')">🎲 완전 랜덤</button>
  </div>
</div>

<!-- 결과 -->
<div class="result-section" id="result-area">
  <div class="placeholder-card">
    <div class="icon">💡</div>
    <p>조건을 선택하고 주제 생성을 눌러보세요<br><span style="font-size:11px;color:#333">발행한 주제는 자동으로 회피해요</span></p>
  </div>
</div>

<div class="divider"></div>

<!-- 저장 목록 -->
<div>
  <div class="saved-header">
    <span class="saved-title">📁 저장된 주제</span>
    <div class="saved-actions">
      <span class="saved-count-badge" id="saved-count">0개</span>
      <button class="btn-export" onclick="exportSaved()">전체 복사</button>
    </div>
  </div>
  <div id="saved-list">
    <div class="saved-empty">저장된 주제가 없어요.<br>마음에 드는 아이디어를 저장해보세요!</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let savedTopics = [];
let currentTopic = null;
let isLoading = false;
let isScriptLoading = false;

const FORMAT_TAG = {
  '교육형':    { cls: 'tag-edu',     emoji: '📚' },
  '리스트형':  { cls: 'tag-list',   emoji: '📋' },
  '비교형':    { cls: 'tag-compare', emoji: '⚡' },
  '트렌드형':  { cls: 'tag-news',   emoji: '📰' },
  '사례형':    { cls: 'tag-case',    emoji: '📊' },
  '저장형':    { cls: 'tag-list',   emoji: '🔖' },
  '댓글자료형': { cls: 'tag-edu',   emoji: '💬' },
};

// 칩 토글
function toggleSingle(el) {
  const group = el.dataset.group;
  document.querySelectorAll(`.chip.single-select[data-group="${group}"]`).forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
}
function toggleMulti(el) {
  el.classList.toggle('selected');
}

function getSelected(groupId) {
  return [...document.querySelectorAll(`#${groupId} .chip.selected`)].map(c => c.dataset.val);
}
function getSingleSelected(groupId) {
  const el = document.querySelector(`#${groupId} .chip.selected`);
  return el ? el.dataset.val : null;
}

// API
function saveApiKey() {
  const key = document.getElementById('api-key').value.trim();
  if (!key.startsWith('sk-ant-')) { setApiStatus('올바른 키가 아닌 것 같아요 (sk-ant-로 시작)', 'err'); return; }
  localStorage.setItem('jinsim_api_key', key);
  setApiStatus('✓ API 키 저장됐어요', 'ok');
}
function getApiKey() {
  const stored = localStorage.getItem('jinsim_api_key');
  if (stored) { document.getElementById('api-key').value = stored; return stored; }
  return document.getElementById('api-key').value.trim();
}
function setApiStatus(msg, type) {
  const el = document.getElementById('api-status');
  el.textContent = msg;
  el.className = 'api-status ' + type;
}

async function callClaude(systemPrompt, userPrompt, maxTokens) {
  const apiKey = getApiKey();
  if (!apiKey) throw new Error('API 키 없음');
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-6',
      max_tokens: maxTokens || 1000,
      system: systemPrompt,
      messages: [{ role: 'user', content: userPrompt }]
    })
  });
  if (!res.ok) { const e = await res.json(); throw new Error(e.error?.message || `HTTP ${res.status}`); }
  const data = await res.json();
  return data.content?.map(b => b.text || '').join('').trim();
}

// 이미 발행하거나 저장된 주제 목록
function getUsedTopics() {
  return savedTopics.map(t => t.topic);
}

async function generate(mode) {
  if (isLoading) return;
  const apiKey = getApiKey();
  if (!apiKey) { setApiStatus('API 키를 먼저 입력해주세요', 'err'); document.getElementById('api-key').focus(); return; }

  isLoading = true;
  setBtnsDisabled(true);
  document.getElementById('result-area').innerHTML = `<div class="loading-card"><div class="spinner"></div><p>주제 생성 중...</p></div>`;

  const usedTopics = getUsedTopics();
  const avoidText = usedTopics.length > 0
    ? `\n\n⚠️ 아래 주제들과 겹치지 않게 해주세요 (이미 저장/발행된 주제):\n${usedTopics.map((t,i)=>`${i+1}. ${t}`).join('\n')}`
    : '';

  const systemPrompt = `당신은 병원 마케팅 대행사 애드리절트의 인스타그램 계정 @jinsim_ii를 위한 캐러셀 주제 기획 전문가입니다.
타겟: 병원 원장님 (B2B 의사결정권자 전체, 특정 진료과 무관)
목적: 팔로우 유도 / 저장·공유 / 상담 신청
포지셔닝: "병원마케터 진심이" - 병원마케팅의 모든 것을 솔직하게 알려주는 전문가
검증된 성공 공식: 훅에 구체적 숫자·결과 포함. "광고비 0원", "AI 검색", "규제" 등 원장님 불안 자극. CTA는 "댓글로 키워드 남기면 자료 드림" 패턴.
반드시 아래 JSON만 반환 (설명·마크다운·코드블럭 없이):
{"topic":"제목","hook":"훅 문장","format":"교육형|리스트형|비교형|트렌드형|사례형","slideCount":숫자,"structure":"구조","savePoint":"저장율 이유","cta":"CTA 문구","difficulty":"쉬움|보통|어려움"}`;

  let userPrompt = '';
  if (mode === 'random') {
    userPrompt = `병원 원장님들이 2025년 현재 가장 불안해하거나 궁금해하는 주제를 하나 골라 캐러셀을 기획해주세요. 매번 다양하게 골라주세요.${avoidText}`;
  } else {
    const situation = getSingleSelected('chips-situation');
    const concerns = getSelected('chips-concern');
    const formatHint = getSingleSelected('chips-format');
    const extra = document.getElementById('kw-extra').value.trim();

    let context = [];
    if (situation) context.push(`원장님 상황: ${situation}`);
    if (concerns.length) context.push(`주요 고민: ${concerns.join(', ')}`);
    if (formatHint && formatHint !== '자동 추천') context.push(`원하는 포맷: ${formatHint}`);
    if (extra) context.push(`추가 메모: ${extra}`);

    if (!context.length) {
      userPrompt = `병원 원장님 타겟으로 반응 좋을 캐러셀 주제 1개를 기획해주세요.${avoidText}`;
    } else {
      userPrompt = `아래 조건을 반영해서 병원 원장님 타겟 캐러셀 주제 1개를 기획해주세요.\n\n${context.join('\n')}${avoidText}`;
    }
  }

  try {
    const raw = await callClaude(systemPrompt, userPrompt, 1000);
    const clean = raw.replace(/```json|```/g, '').trim();
    currentTopic = JSON.parse(clean);
    renderResult(currentTopic);
    setApiStatus('', '');
  } catch (e) {
    document.getElementById('result-area').innerHTML = `<div class="error-card">⚠️ 오류: ${e.message}<br><small style="color:#aa4444;margin-top:4px;display:block">다시 시도해보세요.</small></div>`;
  }
  isLoading = false;
  setBtnsDisabled(false);
}

function setBtnsDisabled(v) {
  document.getElementById('btn-gen').disabled = v;
  document.getElementById('btn-rand').disabled = v;
}

function renderResult(t) {
  const fmt = FORMAT_TAG[t.format] || { cls: 'tag-gray', emoji: '📌' };
  const diffColor = { '쉬움': '#55cc88', '보통': '#ddaa44', '어려움': '#ff6666' }[t.difficulty] || '#666';
  const isSaved = savedTopics.some(s => s.topic === t.topic);

  document.getElementById('result-area').innerHTML = `
    <div class="result-card">
      <div class="result-tags">
        <span class="tag ${fmt.cls}">${fmt.emoji} ${t.format}</span>
        <span class="tag tag-gray">${t.slideCount}장</span>
        <span class="tag tag-gray" style="color:${diffColor}">난이도 ${t.difficulty}</span>
      </div>
      <div class="result-topic">${t.topic}</div>
      <div class="field">
        <div class="field-label">1번 슬라이드 훅</div>
        <div class="field-hook">"${t.hook}"</div>
      </div>
      <div class="two-col">
        <div class="field">
          <div class="field-label">슬라이드 구조</div>
          <div class="field-value">${t.structure}</div>
        </div>
        <div class="field">
          <div class="field-label">저장율 높은 이유</div>
          <div class="field-value">${t.savePoint}</div>
        </div>
      </div>
      <div class="field">
        <div class="field-label">CTA (마지막 슬라이드)</div>
        <div class="field-cta">💬 ${t.cta}</div>
      </div>
      <div class="card-actions">
        <button class="btn-save ${isSaved ? 'saved' : ''}" id="btn-save-cur" onclick="saveCurrent()">
          ${isSaved ? '✓ 저장됨' : '+ 저장하기'}
        </button>
        <button class="btn-copy" id="btn-copy-cur" onclick="copyResult()">📋 복사</button>
        <button class="btn-script" id="btn-script-cur" onclick="generateScript(currentTopic, 'script-area-current')">✍️ 원고 생성</button>
      </div>
    </div>
    <div class="script-section" id="script-area-current"></div>`;
}

async function generateScript(topic, targetId) {
  if (isScriptLoading) return;
  isScriptLoading = true;

  const btn = document.getElementById('btn-script-cur');
  if (btn) { btn.disabled = true; btn.textContent = '생성 중...'; }

  const targetEl = document.getElementById(targetId);
  if (targetEl) targetEl.innerHTML = `<div class="loading-card"><div class="spinner"></div><p>원고 작성 중...</p><p class="sub">약 30초 소요될 수 있어요</p></div>`;

  const systemPrompt = `당신은 병원 마케팅 전문 카드뉴스 카피라이터입니다.
타겟: 병원 원장님 (바쁜 의사결정권자)
계정: @jinsim_ii "병원마케터 진심이"
톤앤매너: 친근하고 전문적. 쉬운 단어. 짧고 임팩트 있는 문장. 원장님 입장에서 공감되는 언어. 과장 없이 사실 기반.
각 슬라이드 텍스트는 10~15단어 이내.

중요: 반드시 순수 JSON만 반환하세요. 마크다운, 코드블럭, 설명 텍스트 절대 금지.
본문(body)에 큰따옴표(") 사용 금지 — 대신 『』또는 〈〉사용.
줄바꿈은 반드시 \\n 으로만 표현.
형식: {"slides":[{"num":1,"role":"역할","title":"제목","body":"본문","layoutMemo":"메모"},...]}`  ;

  const userPrompt = `아래 주제로 캐러셀 원고를 슬라이드별로 작성해주세요.
주제: ${topic.topic}
훅: ${topic.hook}
포맷: ${topic.format} (${topic.slideCount}장)
구조: ${topic.structure}
CTA: ${topic.cta}

각 슬라이드마다 제목, 본문, 디자이너용 레이아웃 메모를 작성해주세요.
레이아웃 메모는 배경톤, 강조 요소, 텍스트 크기 힌트 등 디자이너에게 전달할 내용을 구체적으로 써주세요.
본문에 큰따옴표(") 절대 사용 금지.`;

  try {
    const raw = await callClaude(systemPrompt, userPrompt, 3000);

    // 1차: 코드블럭 제거 후 파싱 시도
    let clean = raw.replace(/```json|```/g, '').trim();
    const jsonMatch = clean.match(/\{[\s\S]*\}/);
    if (jsonMatch) clean = jsonMatch[0];

    let parsed;
    try {
      parsed = JSON.parse(clean);
    } catch(e1) {
      // 2차: 문자열 값 내 줄바꿈 제거 후 재시도
      const fixed = clean.replace(/"([^"]*?)"/g, (match, inner) => {
        return '"' + inner.replace(/\n/g, '\\n').replace(/\r/g, '').replace(/\t/g, ' ') + '"';
      });
      try {
        parsed = JSON.parse(fixed);
      } catch(e2) {
        // 3차: Claude에게 JSON 수정 요청
        const fixRaw = await callClaude(
          '유효한 JSON만 반환하세요. 설명 없이 JSON만.',
          `아래 텍스트를 파싱 가능한 올바른 JSON으로 수정해서 반환해주세요. slides 배열 구조를 유지하세요:\n\n${clean}`,
          2000
        );
        const fixClean = fixRaw.replace(/```json|```/g, '').trim();
        const fixMatch = fixClean.match(/\{[\s\S]*\}/);
        parsed = JSON.parse(fixMatch ? fixMatch[0] : fixClean);
      }
    }
    renderScript(parsed.slides, targetId, topic);
  } catch(e) {
    if (targetEl) targetEl.innerHTML = `<div class="error-card" style="margin-top:12px">⚠️ 원고 생성 오류: ${e.message}<br><small style="color:#aa4444;margin-top:6px;display:block">다시 한 번 눌러보세요. 계속 되면 슬라이드 수를 줄여보세요.</small></div>`;
  }

  isScriptLoading = false;
  if (btn) { btn.disabled = false; btn.textContent = '✍️ 원고 재생성'; }
}

function renderScript(slides, targetId, topic) {
  const targetEl = document.getElementById(targetId);
  if (!targetEl) return;
  const slidesHtml = slides.map(s => `
    <div class="slide-block">
      <div class="slide-num-bar">
        <span class="slide-num">슬라이드 ${s.num}</span>
        <span class="slide-role">${s.role || ''}</span>
      </div>
      <div class="slide-content">
        <div class="slide-title-text">${s.title}</div>
        <div class="slide-body-text">${(s.body||'').replace(/\\n/g,'\n')}</div>
        <div class="slide-layout-label">디자이너 메모</div>
        <div class="slide-layout-memo">${s.layoutMemo||''}</div>
      </div>
    </div>`).join('');

  const escapedSlides = JSON.stringify(slides).replace(/'/g, "\\'");
  targetEl.innerHTML = `
    <div class="script-card">
      <div class="script-header">
        <span class="script-header-title">✍️ 원고 — ${topic.topic}</span>
        <button class="btn-script-copy" onclick='copyScriptData(${JSON.stringify(slides).replace(/"/g,"&quot;")})'>전체 복사</button>
      </div>
      <div class="script-body">${slidesHtml}</div>
    </div>`;
}

function copyScriptData(slides) {
  const text = slides.map(s =>
    `[슬라이드 ${s.num}] ${s.role}\n제목: ${s.title}\n본문:\n${(s.body||'').replace(/\\n/g,'\n')}\n📐 디자이너 메모: ${s.layoutMemo||''}`
  ).join('\n\n---\n\n');
  navigator.clipboard.writeText(text).then(() => showToast('원고 전체 복사됐어요!'));
}

function saveCurrent() {
  if (!currentTopic || savedTopics.some(s => s.topic === currentTopic.topic)) return;
  savedTopics.push({ ...currentTopic, id: Date.now(), published: false });
  renderSaved(); updateBadge();
  const btn = document.getElementById('btn-save-cur');
  if (btn) { btn.textContent = '✓ 저장됨'; btn.classList.add('saved'); }
  showToast('저장됐어요!');
}

function copyResult() {
  if (!currentTopic) return;
  const t = currentTopic;
  const fmt = FORMAT_TAG[t.format] || { emoji: '📌' };
  const text = `📌 주제: ${t.topic}\n💬 훅: "${t.hook}"\n📐 포맷: ${fmt.emoji} ${t.format} (${t.slideCount}장)\n🔢 구조: ${t.structure}\n📣 CTA: ${t.cta}\n💡 저장율: ${t.savePoint}`;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('btn-copy-cur');
    if (btn) { btn.textContent = '✓ 복사됨'; }
    showToast('복사됐어요!');
    setTimeout(() => { if (btn) btn.textContent = '📋 복사'; }, 2000);
  });
}

function togglePublished(id) {
  const t = savedTopics.find(s => s.id === id);
  if (!t) return;
  t.published = !t.published;
  renderSaved(); updateBadge();
  showToast(t.published ? '✅ 발행 완료로 표시됐어요' : '발행 취소됐어요');
}

function deleteSaved(id) {
  savedTopics = savedTopics.filter(s => s.id !== id);
  renderSaved(); updateBadge();
}

function generateScriptFromSaved(id) {
  const topic = savedTopics.find(s => s.id === id);
  if (!topic) return;
  generateScript(topic, `script-saved-${id}`);
}

function renderSaved() {
  const el = document.getElementById('saved-list');
  if (!savedTopics.length) {
    el.innerHTML = `<div class="saved-empty">저장된 주제가 없어요.<br>마음에 드는 아이디어를 저장해보세요!</div>`;
    return;
  }

  const pending = savedTopics.filter(t => !t.published);
  const published = savedTopics.filter(t => t.published);

  let html = '';

  if (pending.length) {
    html += pending.map((t, i) => renderSavedItem(t, i+1)).join('');
  }

  if (published.length) {
    html += `<div class="published-section-label">✅ 발행 완료</div>`;
    html += published.map((t, i) => renderSavedItem(t, i+1, true)).join('');
  }

  el.innerHTML = html;
}

function renderSavedItem(t, i, isPublished) {
  const fmt = FORMAT_TAG[t.format] || { cls: 'tag-gray', emoji: '📌' };
  return `
    <div>
      <div class="saved-item ${isPublished ? 'published' : ''}">
        <div class="saved-num">${String(i).padStart(2,'0')}</div>
        <div class="saved-content">
          <div class="saved-topic">${t.topic}</div>
          <div class="saved-hook">"${t.hook}"</div>
          <div class="saved-meta">
            <span class="saved-meta-tag">${fmt.emoji} ${t.format}</span>
            <span class="saved-meta-tag">${t.slideCount}장</span>
            <span class="saved-meta-tag">난이도 ${t.difficulty}</span>
            ${isPublished ? '<span class="published-badge">✅ 발행완료</span>' : ''}
          </div>
        </div>
        <div class="saved-item-actions">
          <button class="btn-del" onclick="deleteSaved(${t.id})" title="삭제">×</button>
          <button class="btn-gen-script" onclick="generateScriptFromSaved(${t.id})">✍️ 원고</button>
          <button class="${isPublished ? 'btn-mark-unpublished' : 'btn-mark-published'}" onclick="togglePublished(${t.id})">
            ${isPublished ? '↩ 발행 취소' : '✅ 발행 완료'}
          </button>
        </div>
      </div>
      <div id="script-saved-${t.id}"></div>
    </div>`;
}

function updateBadge() {
  const n = savedTopics.length;
  const p = savedTopics.filter(t => t.published).length;
  document.getElementById('saved-badge').textContent = `저장 ${n}개 · 발행 ${p}개`;
  document.getElementById('saved-count').textContent = `${n}개`;
}

function exportSaved() {
  if (!savedTopics.length) { showToast('저장된 주제가 없어요'); return; }
  const text = savedTopics.map((t, i) => {
    const fmt = FORMAT_TAG[t.format] || { emoji: '📌' };
    const status = t.published ? '[발행완료]' : '[미발행]';
    return `${status} [${i+1}] ${t.topic}\n훅: "${t.hook}"\n포맷: ${fmt.emoji} ${t.format} (${t.slideCount}장)\n구조: ${t.structure}\nCTA: ${t.cta}\n---`;
  }).join('\n\n');
  navigator.clipboard.writeText(text).then(() => showToast('전체 목록 복사됐어요!'));
}

function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2200);
}

window.addEventListener('load', () => {
  const stored = localStorage.getItem('jinsim_api_key');
  if (stored) { document.getElementById('api-key').value = stored; setApiStatus('✓ 저장된 API 키가 있어요', 'ok'); }
});
</script>

</div><!-- /app-content -->

<script>
const TEAM_PASSWORD = 'jinsim';

function checkPassword() {
  const pw = document.getElementById('lock-pw').value;
  if (pw === TEAM_PASSWORD) {
    localStorage.setItem('jinsim_auth', 'true');
    document.getElementById('lock-screen').style.display = 'none';
    document.getElementById('app-content').style.display = 'block';
  } else {
    document.getElementById('lock-error').textContent = '비밀번호가 틀렸어요. 다시 시도해주세요.';
    document.getElementById('lock-pw').value = '';
    document.getElementById('lock-pw').focus();
  }
}

document.addEventListener('DOMContentLoaded', () => {
  const authed = localStorage.getItem('jinsim_auth');
  if (authed === 'true') {
    document.getElementById('lock-screen').style.display = 'none';
    document.getElementById('app-content').style.display = 'block';
  }
  const pwInput = document.getElementById('lock-pw');
  if (pwInput) {
    pwInput.addEventListener('keydown', e => { if (e.key === 'Enter') checkPassword(); });
  }
});
</script>

</body>
</html>
