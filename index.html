<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>진심이 주제 생성기</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', -apple-system, sans-serif;
    background: #0d0d14;
    color: #e8e8f0;
    min-height: 100vh;
    padding: 32px 24px;
    max-width: 760px;
    margin: 0 auto;
  }

  .header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 28px; }
  .header-left h1 { font-size: 22px; font-weight: 800; color: #fff; letter-spacing: -0.03em; margin-bottom: 4px; }
  .header-left p { font-size: 12px; color: #555; }
  .header-badge { background: #1a1a28; border: 1px solid #2e2e48; border-radius: 8px; padding: 6px 14px; font-size: 12px; color: #8888bb; white-space: nowrap; }

  .api-section { background: #13131e; border: 1px solid #2a2a40; border-radius: 12px; padding: 16px 18px; margin-bottom: 16px; }
  .api-section label { font-size: 11px; color: #666; text-transform: uppercase; letter-spacing: .06em; display: block; margin-bottom: 8px; }
  .api-row { display: flex; gap: 8px; }
  .api-input { flex: 1; background: #0d0d14; border: 1px solid #2a2a40; border-radius: 8px; padding: 9px 13px; font-size: 13px; color: #e0e0f0; outline: none; font-family: monospace; transition: border-color .2s; }
  .api-input:focus { border-color: #6366f1; }
  .api-input::placeholder { color: #333; }
  .btn-api-save { background: #1e1e32; border: 1px solid #3a3a58; border-radius: 8px; padding: 9px 16px; font-size: 12px; font-weight: 600; color: #9999cc; cursor: pointer; white-space: nowrap; transition: all .15s; }
  .btn-api-save:hover { background: #252540; border-color: #6366f1; color: #aaaaff; }
  .api-status { font-size: 11px; margin-top: 6px; min-height: 16px; }
  .api-status.ok { color: #55cc88; }
  .api-status.err { color: #ff6666; }

  .input-section { background: #13131e; border: 1px solid #2a2a40; border-radius: 12px; padding: 16px 18px; margin-bottom: 16px; }
  .input-section label { font-size: 11px; color: #666; text-transform: uppercase; letter-spacing: .06em; display: block; margin-bottom: 8px; }
  .input-row { display: flex; gap: 8px; }
  .kw-input { flex: 1; background: #0d0d14; border: 1px solid #2a2a40; border-radius: 8px; padding: 11px 14px; font-size: 14px; color: #e0e0f0; outline: none; font-family: inherit; transition: border-color .2s; }
  .kw-input:focus { border-color: #6366f1; }
  .kw-input::placeholder { color: #333; }

  .btn { border: none; border-radius: 8px; padding: 11px 18px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit; transition: all .15s; white-space: nowrap; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-primary { background: #6366f1; color: #fff; }
  .btn-primary:not(:disabled):hover { background: #5254d4; transform: translateY(-1px); }
  .btn-random { background: #1e1e32; border: 1px solid #3a3a58; color: #c0c0e8; }
  .btn-random:not(:disabled):hover { background: #25253e; border-color: #6366f1; }

  .result-section { margin-bottom: 20px; }
  .placeholder-card { background: #13131e; border: 1px dashed #2a2a40; border-radius: 12px; padding: 40px 24px; text-align: center; color: #444; }
  .placeholder-card .icon { font-size: 36px; margin-bottom: 12px; }
  .placeholder-card p { font-size: 13px; line-height: 1.6; }

  .loading-card { background: #13131e; border: 1px solid #2a2a40; border-radius: 12px; padding: 48px 24px; text-align: center; }
  .spinner { width: 28px; height: 28px; border: 2px solid #2a2a40; border-top-color: #6366f1; border-radius: 50%; animation: spin .7s linear infinite; margin: 0 auto 14px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-card p { font-size: 13px; color: #555; }
  .loading-card .loading-sub { font-size: 11px; color: #444; margin-top: 6px; }

  .result-card { background: #13131e; border: 1px solid #2a2a40; border-radius: 12px; padding: 22px; animation: fadeUp .3s ease; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  .result-tags { display: flex; gap: 7px; flex-wrap: wrap; margin-bottom: 14px; }
  .tag { font-size: 11px; padding: 3px 10px; border-radius: 99px; font-weight: 500; }
  .tag-edu { background: #1a1a38; color: #8888ff; border: 1px solid #2e2e5a; }
  .tag-list { background: #0f2018; color: #55bb77; border: 1px solid #1e4030; }
  .tag-compare { background: #280f10; color: #ff7777; border: 1px solid #4a1e1e; }
  .tag-news { background: #251e08; color: #ddaa44; border: 1px solid #443310; }
  .tag-case { background: #0a1e28; color: #44aadd; border: 1px solid #103344; }
  .tag-gray { background: #1a1a1a; color: #666; border: 1px solid #2a2a2a; }

  .result-topic { font-size: 20px; font-weight: 800; color: #fff; line-height: 1.35; letter-spacing: -0.025em; margin-bottom: 18px; }

  .field { margin-bottom: 12px; }
  .field-label { font-size: 10px; color: #555; text-transform: uppercase; letter-spacing: .07em; margin-bottom: 5px; }
  .field-value { font-size: 13px; color: #b0b0cc; line-height: 1.6; background: #0d0d14; border-radius: 7px; padding: 10px 14px; }
  .field-hook { font-size: 14px; color: #d0d0f0; border-left: 3px solid #6366f1; background: #0d0d14; border-radius: 0 7px 7px 0; padding: 10px 14px; line-height: 1.6; font-style: italic; }
  .field-cta { font-size: 13px; color: #55dd88; background: #081810; border: 1px solid #0f3020; border-radius: 7px; padding: 10px 14px; line-height: 1.6; }

  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }

  .card-actions { display: flex; gap: 8px; margin-top: 18px; padding-top: 16px; border-top: 1px solid #1e1e2e; flex-wrap: wrap; }
  .btn-save { background: #0f2820; border: 1px solid #1e4835; color: #44cc77; border-radius: 8px; padding: 9px 18px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit; transition: all .15s; }
  .btn-save:hover { background: #142e25; }
  .btn-save.saved { color: #33aa55; cursor: default; opacity: 0.7; }
  .btn-copy { background: #1a1a2e; border: 1px solid #2e2e48; color: #8888bb; border-radius: 8px; padding: 9px 18px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit; transition: all .15s; }
  .btn-copy:hover { background: #20203a; }
  .btn-copy.copied { color: #55cc88; }
  .btn-script { background: #1e1428; border: 1px solid #3a2858; color: #bb88ff; border-radius: 8px; padding: 9px 18px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit; transition: all .15s; }
  .btn-script:hover { background: #251a35; }
  .btn-script:disabled { opacity: 0.4; cursor: not-allowed; }

  .error-card { background: #1e0a0a; border: 1px solid #4a1515; border-radius: 12px; padding: 16px 18px; color: #ff7777; font-size: 13px; line-height: 1.6; }

  /* 원고 영역 */
  .script-section { margin-top: 16px; }
  .script-card { background: #0f0f1a; border: 1px solid #2a2a50; border-radius: 12px; overflow: hidden; animation: fadeUp .3s ease; }
  .script-header { background: #1a1428; border-bottom: 1px solid #2a2050; padding: 14px 18px; display: flex; align-items: center; justify-content: space-between; }
  .script-header-title { font-size: 13px; font-weight: 700; color: #cc99ff; }
  .script-header-actions { display: flex; gap: 8px; }
  .btn-script-copy { background: #251a38; border: 1px solid #3a2858; color: #aa77ee; border-radius: 6px; padding: 5px 12px; font-size: 11px; font-weight: 600; cursor: pointer; font-family: inherit; transition: all .15s; }
  .btn-script-copy:hover { background: #30205a; }
  .script-body { padding: 18px; }

  .slide-block { margin-bottom: 16px; border: 1px solid #1e1e38; border-radius: 10px; overflow: hidden; }
  .slide-block:last-child { margin-bottom: 0; }
  .slide-num-bar { background: #1a1428; padding: 8px 14px; display: flex; align-items: center; gap: 8px; }
  .slide-num { font-size: 10px; font-weight: 700; color: #8866cc; text-transform: uppercase; letter-spacing: .08em; }
  .slide-role { font-size: 10px; color: #555; }
  .slide-content { padding: 12px 14px; }
  .slide-title-text { font-size: 14px; font-weight: 700; color: #e0d8ff; margin-bottom: 6px; line-height: 1.4; }
  .slide-body-text { font-size: 13px; color: #9090b8; line-height: 1.7; white-space: pre-wrap; margin-bottom: 8px; }
  .slide-layout-memo { font-size: 11px; color: #664488; background: #0f0a18; border: 1px solid #2a1850; border-radius: 5px; padding: 6px 10px; line-height: 1.5; }
  .slide-layout-label { font-size: 10px; color: #553377; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 2px; }

  .divider { height: 1px; background: #1a1a28; margin: 24px 0; }

  .saved-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .saved-title { font-size: 14px; font-weight: 700; color: #666; }
  .saved-actions { display: flex; gap: 8px; align-items: center; }
  .saved-count-badge { background: #1a1a28; border: 1px solid #2e2e48; border-radius: 99px; padding: 2px 10px; font-size: 11px; color: #8888bb; }
  .btn-export { background: #1a1a28; border: 1px solid #2e2e48; border-radius: 7px; padding: 5px 12px; font-size: 11px; font-weight: 600; color: #7777aa; cursor: pointer; font-family: inherit; transition: all .15s; }
  .btn-export:hover { background: #20203a; color: #9999cc; }

  .saved-empty { text-align: center; padding: 28px; color: #333; font-size: 12px; background: #13131e; border: 1px dashed #2a2a40; border-radius: 10px; line-height: 1.7; }

  .saved-item { background: #13131e; border: 1px solid #2a2a40; border-radius: 10px; padding: 14px 16px; margin-bottom: 8px; display: flex; align-items: flex-start; gap: 12px; transition: border-color .15s; animation: fadeUp .2s ease; }
  .saved-item:hover { border-color: #3a3a58; }
  .saved-num { font-size: 10px; color: #444; padding-top: 3px; flex-shrink: 0; width: 20px; }
  .saved-content { flex: 1; min-width: 0; }
  .saved-topic { font-size: 14px; font-weight: 700; color: #d0d0e8; line-height: 1.4; margin-bottom: 5px; }
  .saved-hook { font-size: 12px; color: #555; line-height: 1.5; margin-bottom: 7px; font-style: italic; }
  .saved-meta { display: flex; gap: 6px; flex-wrap: wrap; }
  .saved-meta-tag { font-size: 10px; padding: 1px 8px; border-radius: 99px; background: #1a1a28; border: 1px solid #2a2a40; color: #666; }
  .saved-item-actions { display: flex; flex-direction: column; gap: 6px; flex-shrink: 0; }
  .btn-del { background: none; border: none; color: #333; cursor: pointer; font-size: 18px; line-height: 1; padding: 2px 4px; transition: color .15s; border-radius: 4px; }
  .btn-del:hover { color: #cc3333; background: #1e0a0a; }
  .btn-gen-script { background: #1e1428; border: 1px solid #3a2858; color: #9966dd; border-radius: 6px; padding: 4px 10px; font-size: 11px; font-weight: 600; cursor: pointer; font-family: inherit; transition: all .15s; white-space: nowrap; }
  .btn-gen-script:hover { background: #251a35; color: #bb88ff; }

  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(60px); background: #1e2e1e; border: 1px solid #2e4e2e; color: #55cc77; padding: 10px 20px; border-radius: 99px; font-size: 13px; font-weight: 600; transition: transform .25s ease, opacity .25s ease; opacity: 0; pointer-events: none; z-index: 100; }
  .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <h1>🧠 진심이 주제 생성기</h1>
    <p>@jinsim_ii · 병원 원장님 타겟 · B2B 캐러셀 기획 + 원고</p>
  </div>
  <div class="header-badge" id="saved-badge">저장 0개</div>
</div>

<div class="api-section">
  <label>Anthropic API Key</label>
  <div class="api-row">
    <input class="api-input" type="password" id="api-key" placeholder="sk-ant-..." />
    <button class="btn-api-save" onclick="saveApiKey()">저장</button>
  </div>
  <div class="api-status" id="api-status"></div>
</div>

<div class="input-section">
  <label>키워드 / 상황 입력 (선택사항)</label>
  <div class="input-row">
    <input class="kw-input" type="text" id="kw-input" placeholder="예: AI 검색, 광고비, 네이버 플레이스, 의료광고 규제..." />
    <button class="btn btn-primary" id="btn-gen" onclick="generate('keyword')">맞춤 생성</button>
    <button class="btn btn-random" id="btn-rand" onclick="generate('random')">🎲 랜덤</button>
  </div>
</div>

<div class="result-section" id="result-area">
  <div class="placeholder-card">
    <div class="icon">💡</div>
    <p>API 키를 입력하고<br>키워드를 넣거나 랜덤 버튼을 눌러보세요</p>
  </div>
</div>

<div class="divider"></div>

<div>
  <div class="saved-header">
    <span class="saved-title">📁 저장된 주제</span>
    <div class="saved-actions">
      <span class="saved-count-badge" id="saved-count">0개</span>
      <button class="btn-export" onclick="exportSaved()">텍스트로 내보내기</button>
    </div>
  </div>
  <div id="saved-list">
    <div class="saved-empty">저장된 주제가 없어요.<br>마음에 드는 아이디어를 저장해보세요!</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let savedTopics = [];
let currentTopic = null;
let isLoading = false;
let isScriptLoading = false;

const FORMAT_TAG = {
  '교육형':  { cls: 'tag-edu',     emoji: '📚' },
  '리스트형': { cls: 'tag-list',   emoji: '📋' },
  '비교형':  { cls: 'tag-compare', emoji: '⚡' },
  '트렌드형': { cls: 'tag-news',   emoji: '📰' },
  '사례형':  { cls: 'tag-case',    emoji: '📊' },
};

const SLIDE_ROLES = {
  1: '훅', 2: '문제 제기', 3: '본론', 4: '본론', 5: '본론',
  6: '본론', 7: '본론', 8: '본론', 9: '요약', 10: 'CTA'
};

function saveApiKey() {
  const key = document.getElementById('api-key').value.trim();
  if (!key.startsWith('sk-ant-')) {
    setApiStatus('올바른 Anthropic API 키가 아닌 것 같아요 (sk-ant-로 시작해야 해요)', 'err');
    return;
  }
  localStorage.setItem('jinsim_api_key', key);
  setApiStatus('✓ API 키가 저장됐어요', 'ok');
}

function getApiKey() {
  const stored = localStorage.getItem('jinsim_api_key');
  if (stored) { document.getElementById('api-key').value = stored; return stored; }
  return document.getElementById('api-key').value.trim();
}

function setApiStatus(msg, type) {
  const el = document.getElementById('api-status');
  el.textContent = msg;
  el.className = 'api-status ' + type;
}

async function callClaude(systemPrompt, userPrompt, maxTokens) {
  const apiKey = getApiKey();
  if (!apiKey) throw new Error('API 키 없음');
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-6',
      max_tokens: maxTokens || 1000,
      system: systemPrompt,
      messages: [{ role: 'user', content: userPrompt }]
    })
  });
  if (!res.ok) {
    const err = await res.json();
    throw new Error(err.error?.message || `HTTP ${res.status}`);
  }
  const data = await res.json();
  return data.content?.map(b => b.text || '').join('').trim();
}

async function generate(mode) {
  if (isLoading) return;
  const apiKey = getApiKey();
  if (!apiKey) { setApiStatus('API 키를 먼저 입력해주세요', 'err'); document.getElementById('api-key').focus(); return; }
  const kw = document.getElementById('kw-input').value.trim();
  if (mode === 'keyword' && !kw) { document.getElementById('kw-input').focus(); return; }

  isLoading = true;
  setBtnsDisabled(true);
  document.getElementById('result-area').innerHTML = `<div class="loading-card"><div class="spinner"></div><p>주제 아이디어 생성 중...</p></div>`;

  const systemPrompt = `당신은 병원 마케팅 대행사 애드리절트의 인스타그램 계정 @jinsim_ii를 위한 캐러셀 주제 기획 전문가입니다.
타겟: 병원 원장님 (B2B 의사결정권자)
목적: 팔로우 유도 / 저장·공유 / 상담 신청
포지셔닝: "병원마케터 진심이" - 병원마케팅의 모든 것을 솔직하게 알려주는 전문가
검증된 성공 공식: 훅에 "광고비 0원", 구체적 숫자, 결과 포함. "AI 검색", "규제", "광고 효율" 등 원장님 불안 자극. CTA는 "댓글로 키워드 남기면 자료 드림" 패턴.
반드시 아래 JSON만 반환 (설명·마크다운·코드블럭 없이):
{"topic":"제목","hook":"훅 문장","format":"교육형|리스트형|비교형|트렌드형|사례형","slideCount":숫자,"structure":"구조","savePoint":"저장율 이유","cta":"CTA 문구","difficulty":"쉬움|보통|어려움"}`;

  const userPrompt = mode === 'keyword'
    ? `키워드 "${kw}"를 중심으로 병원 원장님 타겟 인스타그램 캐러셀 주제 1개를 기획해주세요.`
    : `병원 원장님들이 2025년 현재 가장 불안해하거나 궁금해하는 주제를 하나 골라 캐러셀을 기획해주세요. 매번 다양한 주제를 선택해주세요.`;

  try {
    const raw = await callClaude(systemPrompt, userPrompt, 1000);
    const clean = raw.replace(/```json|```/g, '').trim();
    currentTopic = JSON.parse(clean);
    renderResult(currentTopic);
    setApiStatus('', '');
  } catch (e) {
    document.getElementById('result-area').innerHTML = `<div class="error-card">⚠️ 오류: ${e.message}<br><small style="color:#aa4444;margin-top:4px;display:block">API 키를 확인하거나 다시 시도해보세요.</small></div>`;
  }
  isLoading = false;
  setBtnsDisabled(false);
}

function setBtnsDisabled(v) {
  document.getElementById('btn-gen').disabled = v;
  document.getElementById('btn-rand').disabled = v;
}

function renderResult(t) {
  const fmt = FORMAT_TAG[t.format] || { cls: 'tag-gray', emoji: '📌' };
  const diffColor = { '쉬움': '#55cc88', '보통': '#ddaa44', '어려움': '#ff6666' }[t.difficulty] || '#666';
  const isSaved = savedTopics.some(s => s.topic === t.topic);

  document.getElementById('result-area').innerHTML = `
    <div class="result-card">
      <div class="result-tags">
        <span class="tag ${fmt.cls}">${fmt.emoji} ${t.format}</span>
        <span class="tag tag-gray">${t.slideCount}장</span>
        <span class="tag tag-gray" style="color:${diffColor}">난이도 ${t.difficulty}</span>
      </div>
      <div class="result-topic">${t.topic}</div>
      <div class="field">
        <div class="field-label">1번 슬라이드 훅</div>
        <div class="field-hook">"${t.hook}"</div>
      </div>
      <div class="two-col">
        <div class="field">
          <div class="field-label">슬라이드 구조</div>
          <div class="field-value">${t.structure}</div>
        </div>
        <div class="field">
          <div class="field-label">저장율 높은 이유</div>
          <div class="field-value">${t.savePoint}</div>
        </div>
      </div>
      <div class="field">
        <div class="field-label">CTA (마지막 슬라이드)</div>
        <div class="field-cta">💬 ${t.cta}</div>
      </div>
      <div class="card-actions">
        <button class="btn-save ${isSaved ? 'saved' : ''}" id="btn-save-cur" onclick="saveCurrent()">
          ${isSaved ? '✓ 저장됨' : '+ 저장하기'}
        </button>
        <button class="btn-copy" id="btn-copy-cur" onclick="copyResult()">📋 복사</button>
        <button class="btn-script" id="btn-script-cur" onclick="generateScript(currentTopic, 'script-area-current')">✍️ 원고 생성</button>
      </div>
    </div>
    <div class="script-section" id="script-area-current"></div>`;
}

async function generateScript(topic, targetId) {
  if (isScriptLoading) return;
  const apiKey = getApiKey();
  if (!apiKey) { showToast('API 키를 먼저 입력해주세요'); return; }

  isScriptLoading = true;
  const btn = document.getElementById('btn-script-cur');
  if (btn) { btn.disabled = true; btn.textContent = '생성 중...'; }

  const targetEl = document.getElementById(targetId);
  if (targetEl) {
    targetEl.innerHTML = `<div class="loading-card" style="margin-top:12px"><div class="spinner"></div><p>원고 작성 중...</p><p class="loading-sub">슬라이드 ${topic.slideCount}장 분량이라 30초 정도 걸릴 수 있어요</p></div>`;
  }

  const systemPrompt = `당신은 병원 마케팅 전문 카드뉴스 카피라이터입니다.
타겟: 병원 원장님 (바쁜 의사결정권자, B2B)
계정: @jinsim_ii "병원마케터 진심이"
톤앤매너: 친근하지만 전문적. 쉬운 단어. 짧은 문장. 원장님 입장에서 공감되는 언어.
각 슬라이드 텍스트는 10~15단어 이내로 간결하게.
반드시 아래 JSON만 반환 (설명·마크다운·코드블럭 없이):
{"slides":[{"num":1,"role":"역할","title":"슬라이드 제목","body":"본문 텍스트 (줄바꿈은 \\n 사용)","layoutMemo":"디자이너용 레이아웃 메모"},...]}`;

  const userPrompt = `아래 주제로 인스타그램 캐러셀 원고를 작성해주세요.

주제: ${topic.topic}
훅: ${topic.hook}
포맷: ${topic.format}
슬라이드 수: ${topic.slideCount}장
구조: ${topic.structure}
CTA: ${topic.cta}

각 슬라이드마다 제목, 본문, 디자이너용 레이아웃 메모를 작성해주세요.
레이아웃 메모는 "배경색: 어두운 톤", "텍스트 크기: 크게", "강조 포인트: OO" 같은 형식으로 디자이너에게 전달할 내용을 써주세요.`;

  try {
    const raw = await callClaude(systemPrompt, userPrompt, 3000);
    const clean = raw.replace(/```json|```/g, '').trim();
    const parsed = JSON.parse(clean);
    renderScript(parsed.slides, targetId, topic);
  } catch (e) {
    if (targetEl) targetEl.innerHTML = `<div class="error-card" style="margin-top:12px">⚠️ 원고 생성 오류: ${e.message}</div>`;
  }

  isScriptLoading = false;
  if (btn) { btn.disabled = false; btn.textContent = '✍️ 원고 재생성'; }
}

function renderScript(slides, targetId, topic) {
  const targetEl = document.getElementById(targetId);
  if (!targetEl) return;

  const slidesHtml = slides.map(s => `
    <div class="slide-block">
      <div class="slide-num-bar">
        <span class="slide-num">슬라이드 ${s.num}</span>
        <span class="slide-role">${s.role || ''}</span>
      </div>
      <div class="slide-content">
        <div class="slide-title-text">${s.title}</div>
        <div class="slide-body-text">${(s.body || '').replace(/\\n/g, '\n')}</div>
        <div class="slide-layout-label">디자이너 메모</div>
        <div class="slide-layout-memo">${s.layoutMemo || ''}</div>
      </div>
    </div>`).join('');

  targetEl.innerHTML = `
    <div class="script-card" style="margin-top:12px">
      <div class="script-header">
        <span class="script-header-title">✍️ 원고 — ${topic.topic}</span>
        <div class="script-header-actions">
          <button class="btn-script-copy" onclick="copyScript(${JSON.stringify(slides).replace(/"/g, '&quot;')})">전체 복사</button>
        </div>
      </div>
      <div class="script-body">${slidesHtml}</div>
    </div>`;
}

function copyScript(slides) {
  const text = slides.map(s =>
    `[슬라이드 ${s.num}] ${s.role}\n제목: ${s.title}\n본문: ${(s.body||'').replace(/\\n/g,'\n')}\n디자이너 메모: ${s.layoutMemo||''}`
  ).join('\n\n---\n\n');
  navigator.clipboard.writeText(text).then(() => showToast('원고 전체가 복사됐어요!'));
}

function saveCurrent() {
  if (!currentTopic) return;
  if (savedTopics.some(s => s.topic === currentTopic.topic)) return;
  savedTopics.push({ ...currentTopic, id: Date.now() });
  renderSaved();
  updateBadge();
  const btn = document.getElementById('btn-save-cur');
  if (btn) { btn.textContent = '✓ 저장됨'; btn.classList.add('saved'); }
  showToast('저장됐어요!');
}

function copyResult() {
  if (!currentTopic) return;
  const t = currentTopic;
  const fmt = FORMAT_TAG[t.format] || { emoji: '📌' };
  const text = `📌 주제: ${t.topic}\n💬 훅: "${t.hook}"\n📐 포맷: ${fmt.emoji} ${t.format} (${t.slideCount}장)\n🔢 구조: ${t.structure}\n📣 CTA: ${t.cta}\n💡 저장율 높은 이유: ${t.savePoint}`;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('btn-copy-cur');
    if (btn) { btn.textContent = '✓ 복사됨'; btn.classList.add('copied'); }
    showToast('복사됐어요!');
    setTimeout(() => { if (btn) { btn.textContent = '📋 복사'; btn.classList.remove('copied'); } }, 2000);
  });
}

function deleteSaved(id) {
  savedTopics = savedTopics.filter(s => s.id !== id);
  renderSaved();
  updateBadge();
  if (currentTopic && savedTopics.every(s => s.topic !== currentTopic.topic)) {
    const btn = document.getElementById('btn-save-cur');
    if (btn) { btn.textContent = '+ 저장하기'; btn.classList.remove('saved'); }
  }
}

function generateScriptFromSaved(id) {
  const topic = savedTopics.find(s => s.id === id);
  if (!topic) return;
  const targetId = `script-saved-${id}`;
  generateScript(topic, targetId);
}

function renderSaved() {
  const el = document.getElementById('saved-list');
  if (!savedTopics.length) {
    el.innerHTML = `<div class="saved-empty">저장된 주제가 없어요.<br>마음에 드는 아이디어를 저장해보세요!</div>`;
    return;
  }
  el.innerHTML = savedTopics.map((t, i) => {
    const fmt = FORMAT_TAG[t.format] || { cls: 'tag-gray', emoji: '📌' };
    return `
      <div>
        <div class="saved-item">
          <div class="saved-num">${String(i+1).padStart(2,'0')}</div>
          <div class="saved-content">
            <div class="saved-topic">${t.topic}</div>
            <div class="saved-hook">"${t.hook}"</div>
            <div class="saved-meta">
              <span class="saved-meta-tag">${fmt.emoji} ${t.format}</span>
              <span class="saved-meta-tag">${t.slideCount}장</span>
              <span class="saved-meta-tag">난이도 ${t.difficulty}</span>
            </div>
          </div>
          <div class="saved-item-actions">
            <button class="btn-del" onclick="deleteSaved(${t.id})" title="삭제">×</button>
            <button class="btn-gen-script" onclick="generateScriptFromSaved(${t.id})">✍️ 원고</button>
          </div>
        </div>
        <div id="script-saved-${t.id}"></div>
      </div>`;
  }).join('');
}

function updateBadge() {
  const n = savedTopics.length;
  document.getElementById('saved-badge').textContent = `저장 ${n}개`;
  document.getElementById('saved-count').textContent = `${n}개`;
}

function exportSaved() {
  if (!savedTopics.length) { showToast('저장된 주제가 없어요'); return; }
  const text = savedTopics.map((t, i) => {
    const fmt = FORMAT_TAG[t.format] || { emoji: '📌' };
    return `[${i+1}] ${t.topic}\n훅: "${t.hook}"\n포맷: ${fmt.emoji} ${t.format} (${t.slideCount}장) | 난이도: ${t.difficulty}\n구조: ${t.structure}\nCTA: ${t.cta}\n---`;
  }).join('\n\n');
  navigator.clipboard.writeText(text).then(() => showToast('전체 목록이 복사됐어요!'));
}

function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2200);
}

document.getElementById('kw-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') generate('keyword');
});

window.addEventListener('load', () => {
  const stored = localStorage.getItem('jinsim_api_key');
  if (stored) {
    document.getElementById('api-key').value = stored;
    setApiStatus('✓ 저장된 API 키가 있어요', 'ok');
  }
});
</script>
</body>
</html>
